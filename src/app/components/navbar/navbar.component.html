@if (authService.isLoggedIn()) {
<nav class="navbar navbar-expand-lg sticky-top custom-navbar no-print">
  <div class="container">
    
    <!-- BRAND / LOGÓ -->
    <a class="navbar-brand d-flex align-items-center" routerLink="/help">
      <div class="brand-icon me-2">
        <i class="bi bi-building-fill"></i>
      </div>
      <span class="brand-text">Társasház<span class="text-primary">Pro</span></span>
    </a>

    <!-- HAMBURGER GOMB -->
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- ÖSSZECSUKHATÓ TARTALOM -->
    <div class="collapse navbar-collapse" id="navbarNav">
      
      @if (userService.getCurrentUser(); as user) {
      <ul class="navbar-nav mx-auto">
        
        <!-- ADMIN LINK -->
        @if (user.role === "admin") {
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin" routerLinkActive="active">
            <i class="bi bi-grid-1x2-fill me-1"></i> Vezérlőpult
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/edit-users" routerLinkActive="active">
            <i class="bi bi-people-fill me-1"></i> Tulajdonosok
          </a>
        </li>
        }

        <!-- LAKÓ LINK -->
        @if (user.role ==="owner") {
        <li class="nav-item">
          <a class="nav-link" routerLink="/voter" routerLinkActive="active">
            <i class="bi bi-check2-circle me-1"></i> Szavazás
          </a>
        </li>
        }

        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">
            <i class="bi bi-info-square-fill me-1"></i> Rólunk
          </a>
        </li>
      </ul>

      <!-- JOBB OLDAL: PROFIL ÉS KIJELENTKEZÉS -->
      <div class="d-flex align-items-center nav-profile-section">
        <a routerLink="/profile" class="user-chip me-3 text-decoration-none">
          <div class="user-avatar">
            {{ user.name.charAt(0) }}
          </div>
          <span class="user-name d-none d-xl-inline">{{ user.name }}</span>
        </a>

        <button class="btn btn-logout d-flex align-items-center" (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i>
          <span>Kilépés</span>
        </button>
      </div>
      }

    </div>
  </div>
</nav>
}
