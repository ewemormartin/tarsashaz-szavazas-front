<div class="container mt-4 mb-5 animate-fade-in">
  <div class="card create-card border-0 shadow-lg overflow-hidden">
    
    <!-- FEJLÉC -->
    <div class="card-header bg-dark text-white p-4">
      <div class="d-flex align-items-center">
        <div class="header-icon-box me-3">
          <i class="bi bi-calendar-plus-fill"></i>
        </div>
        <div>
          <h2 class="h4 mb-0 fw-bold text-uppercase tracking-wider">Új közgyűlés tervezése</h2>
          <p class="text-white-50 small mb-0">Rögzítse az adatokat és a napirendi pontokat.</p>
        </div>
      </div>
    </div>

    <div class="card-body p-4 p-lg-5">
      <form [formGroup]="meetingForm" (ngSubmit)="onSubmit()">
        
        <!-- 1. SZEKCIÓ: ALAPADATOK -->
        <div class="form-section mb-5">
          <h5 class="section-title mb-4"><span class="step-num">1</span> Alapadatok</h5>
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label fw-bold text-dark">Közgyűlés megnevezése</label>
              <div class="input-group high-contrast-input">
                <span class="input-group-text"><i class="bi bi-fonts"></i></span>
                <input type="text" formControlName="title" class="form-control" 
                       [class.is-invalid]="meetingForm.get('title')?.touched && meetingForm.get('title')?.invalid"
                       placeholder="pl. 2025. Évi Rendes Közgyűlés">
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold text-dark">Dátum és idő</label>
              <input type="datetime-local" formControlName="meeting_date" class="form-control high-contrast-input shadow-sm"
                     [class.is-invalid]="meetingForm.get('meeting_date')?.touched && meetingForm.get('meeting_date')?.invalid">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold text-dark">Helyszín</label>
              <div class="input-group high-contrast-input">
                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                <input type="text" formControlName="location" class="form-control" 
                       [class.is-invalid]="meetingForm.get('location')?.touched && meetingForm.get('location')?.invalid"
                       placeholder="Cím vagy Terem">
              </div>
            </div>
          </div>
        </div>

        <hr class="my-5 opacity-25">

        <!-- 2. SZEKCIÓ: NAPIRENDI PONTOK -->
        <div class="form-section mb-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="section-title mb-0"><span class="step-num">2</span> Napirendi pontok</h5>
            <button type="button" class="btn btn-emerald btn-sm rounded-pill px-3 shadow-sm" (click)="addAgendaItem()">
              <i class="bi bi-plus-lg me-1"></i> Új pont hozzáadása
            </button>
          </div>
          
          <div formArrayName="agenda_items">
            @for (item of agendaItems.controls; track $index; let i = $index) {
              <div [formGroupName]="i" class="agenda-item-box p-4 mb-4 rounded-4 border animate-slide-in shadow-sm bg-white">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <span class="badge bg-primary-dark rounded-pill px-3 py-2 fs-6">#{{ i + 1 }} Napirendi pont</span>
                  
                  @if (agendaItems.length > 1) {
                    <button type="button" class="btn btn-outline-danger btn-sm border-0 rounded-circle delete-btn" 
                            (click)="removeAgendaItem(i)">
                      <i class="bi bi-trash-fill fs-5"></i>
                    </button>
                  }
                </div>
                
                <div class="row g-3">
                  <div class="col-12">
                    <label class="small fw-bold text-muted text-uppercase mb-1">Pont megnevezése</label>
                    <input type="text" formControlName="title" class="form-control form-control-lg fw-bold high-contrast-input-field" 
                           placeholder="Mi a tárgyalt téma?">
                  </div>
                  <div class="col-12">
                    <label class="small fw-bold text-muted text-uppercase mb-1">Részletes leírás</label>
                    <textarea formControlName="description" class="form-control high-contrast-input-field" rows="2" 
                              placeholder="Háttérinformációk..."></textarea>
                  </div>
                  <div class="col-12 mt-3">
                    <div class="resolution-input-wrap p-3 rounded-3 border-start border-4 border-success bg-success-light">
                      <label class="small text-success fw-bold text-uppercase mb-1 d-block">Végleges Határozati Javaslat (Erre fognak szavazni!)</label>
                      <input type="text" formControlName="resolution_text" class="form-control high-contrast-input-field border-success" 
                             placeholder="A közgyűlés elfogadja/határozza...">
                    </div>
                  </div>
                </div>
              </div>
            }
          </div>
        </div>

        <!-- MŰVELETI GOMBOK -->
        <div class="d-flex justify-content-end gap-3 mt-5 pb-4">
          <button type="button" class="btn btn-link text-decoration-none fw-bold text-muted px-4" 
                  (click)="router.navigate(['/admin'])">Mégse</button>
          <button type="submit" class="btn btn-primary-pro btn-lg px-5 rounded-pill shadow-lg" 
                  [disabled]="meetingForm.invalid || loading">
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-2"></span> Mentés folyamatban...
            } @else {
              <i class="bi bi-check-circle-fill me-2"></i> Közgyűlés Véglegesítése
            }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
