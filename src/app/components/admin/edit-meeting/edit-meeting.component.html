<div class="container mt-4 mb-5 animate-fade-in">
  <div class="card edit-card border-0 shadow-lg overflow-hidden">
    
    <!-- DEKORATÍV FEJLÉC -->
    <div class="card-header bg-dark text-white p-4 position-relative">
      <div class="header-accent"></div>
      <div class="d-flex align-items-center position-relative z-1">
        <div class="header-icon-box me-3">
          <i class="bi bi-pencil-square"></i>
        </div>
        <div>
          <h2 class="h4 mb-0 fw-black text-uppercase tracking-wider">Közgyűlés módosítása</h2>
          <p class="text-white-50 small mb-0">Frissítse a meglevő közgyűlés adatait és paramétereit.</p>
        </div>
      </div>
    </div>

    <div class="card-body p-4 p-lg-5">
      @if (loading) {
        <div class="text-center py-5">
          <div class="spinner-grow text-primary" role="status"></div>
          <p class="mt-3 fw-bold text-muted text-uppercase small">Adatok szinkronizálása...</p>
        </div>
      } @else {
        <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
          
          <div class="form-section">
            <!-- 1. Közgyűlés neve -->
            <div class="mb-4">
              <label class="form-label small fw-black text-uppercase text-muted">Közgyűlés megnevezése</label>
              <div class="input-group high-contrast-group shadow-sm">
                <span class="input-group-text bg-white border-end-0 text-primary">
                    <i class="bi bi-fonts fs-5"></i>
                </span>
                <input type="text" formControlName="title" 
                       class="form-control border-start-0 ps-0 fw-bold" 
                       [class.is-invalid]="editForm.get('title')?.touched && editForm.get('title')?.invalid"
                       placeholder="pl. 2025. Éves rendes közgyűlés">
              </div>
            </div>

            <div class="row g-4">
              <!-- 2. Dátum -->
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-black text-uppercase text-muted">Dátum és idő</label>
                <div class="input-group high-contrast-group shadow-sm">
                  <span class="input-group-text bg-white border-end-0 text-primary">
                      <i class="bi bi-calendar-event fs-5"></i>
                  </span>
                  <input type="datetime-local" formControlName="meeting_date" 
                         class="form-control border-start-0 ps-0 fw-bold"
                         [class.is-invalid]="editForm.get('meeting_date')?.touched && editForm.get('meeting_date')?.invalid">
                </div>
              </div>

              <!-- 3. Helyszín -->
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-black text-uppercase text-muted">Helyszín</label>
                <div class="input-group high-contrast-group shadow-sm">
                  <span class="input-group-text bg-white border-end-0 text-primary">
                      <i class="bi bi-geo-alt-fill fs-5"></i>
                  </span>
                  <input type="text" formControlName="location" 
                         class="form-control border-start-0 ps-0 fw-bold" 
                         [class.is-invalid]="editForm.get('location')?.touched && editForm.get('location')?.invalid"
                         placeholder="pl. Társasház belső udvara">
                </div>
              </div>
            </div>
          </div>

          <!-- MŰVELETI GOMBOK -->
          <div class="d-flex justify-content-end align-items-center gap-3 mt-5 pt-4 border-top">
            <button type="button" class="btn btn-link text-decoration-none fw-bold text-muted px-4" routerLink="/admin">
              Mégse
            </button>
            <button type="submit" class="btn btn-primary-pro btn-lg px-5 rounded-pill shadow-lg" 
                    [disabled]="editForm.invalid || loading">
              @if (loading) {
                <span class="spinner-border spinner-border-sm me-2"></span> Mentés...
              } @else {
                <i class="bi bi-check-circle-fill me-2"></i> Módosítások mentése
              }
            </button>
          </div>

        </form>
      }
    </div>
  </div>
</div>
