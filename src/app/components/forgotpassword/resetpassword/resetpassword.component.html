<div class="reset-container">
  <h2>Új jelszó megadása</h2>
  <p>Add meg az új jelszavadat a következő fiókhoz: <strong>{{ email }}</strong></p>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Új jelszó</label>
      <input type="password" formControlName="password" class="form-control">
    </div>

    <div class="form-group">
      <label>Jelszó megerősítése</label>
      <input type="password" formControlName="password_confirmation" class="form-control">
      <small class="text-danger" *ngIf="resetForm.hasError('mismatch') && resetForm.get('password_confirmation')?.touched">
        A két jelszó nem egyezik!
      </small>
    </div>

    <button type="submit" [disabled]="resetForm.invalid || loading" class="btn btn-success">
      Jelszó mentése
    </button>
  </form>

  <p *ngIf="message" class="alert mt-3">{{ message }}</p>
</div>
